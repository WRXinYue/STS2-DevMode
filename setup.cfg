[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    raise NotImplemented

# Python lint for scripts/ (stdlib-only tooling). Run: flake8 scripts
[flake8]
max-line-length = 180
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    .godot,
    icons,
    Publish,
    packages
extend-ignore =
    # Black-compatible
    E203,
