<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpireScratch — STS2</title>
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
      white-space: nowrap;
    }
    header .sep {
      width: 1px;
      height: 24px;
      background: #0f3460;
    }
    header label {
      font-size: 12px;
      color: #7f8c8d;
    }
    header input[type="text"] {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 13px;
      width: 200px;
    }
    header input[type="text"]:focus {
      outline: none;
      border-color: #e94560;
    }
    header select {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    header select:focus { outline: none; border-color: #e94560; }
    header button {
      background: #0f3460;
      color: #e0e0e0;
      border: none;
      padding: 5px 14px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    header button:hover { background: #e94560; }
    header button.primary {
      background: #e94560;
      font-weight: 600;
    }
    header button.primary:hover { background: #c73750; }

    #dirLabel {
      font-size: 11px;
      color: #7f8c8d;
      white-space: nowrap;
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Blockly area ── */
    #blocklyDiv {
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    /* ── Script panel ── */
    #scriptPanel {
      width: 210px;
      flex-shrink: 0;
      background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #scriptPanelHeader {
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #scriptPanelRefresh {
      background: none;
      border: none;
      color: #7f8c8d;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    #scriptPanelRefresh:hover { color: #e94560; }
    #scriptList {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #scriptList::-webkit-scrollbar { width: 4px; }
    #scriptList::-webkit-scrollbar-track { background: transparent; }
    #scriptList::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .script-item {
      padding: 7px 10px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .script-item:hover {
      background: #1a2a4a;
      border-left-color: #e94560;
    }
    .script-item.active {
      background: #1a2a4a;
      border-left-color: #e94560;
    }
    .script-item .s-name {
      font-size: 12px;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .script-item .s-file {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .script-item.has-error .s-name { color: #e74c3c; }
    .script-item.disabled .s-name  { color: #666; }

    .script-empty {
      padding: 16px 10px;
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }
    .script-status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Footer ── */
    footer {
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 6px 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #status {
      color: #7f8c8d;
      flex: 1;
    }
    footer .hint {
      color: #555;
      font-size: 11px;
    }
  </style>
</head>
<body>

<header>
  <h1 id="headerTitle">SpireScratch</h1>
  <div class="sep"></div>

  <label id="labelName">Name:</label>
  <input type="text" id="scriptName" value="My Script" placeholder="Script name">

  <div class="sep"></div>

  <button id="btnSave" class="primary">Save</button>
  <button id="btnBindDir">Bind Folder</button>
  <span id="dirLabel"></span>

  <div class="sep"></div>

  <button id="btnExport">Export XML</button>
  <button id="btnImport">Import XML</button>
  <button id="btnClear">Clear</button>

  <div class="sep"></div>

  <select id="langSelect">
    <option value="en">English</option>
    <option value="zh">中文</option>
  </select>
</header>

<div id="main">
  <div id="blocklyDiv"></div>

  <div id="scriptPanel">
    <div id="scriptPanelHeader">
      <span id="scriptPanelTitle">Scripts</span>
      <button id="scriptPanelRefresh" title="Refresh">↻</button>
    </div>
    <div id="scriptList">
      <div class="script-empty" id="scriptListEmpty">—</div>
    </div>
  </div>
</div>

<footer>
  <span id="status">Loading...</span>
  <span id="stateBadge" style="font-size:11px;color:#7f8c8d;display:none"></span>
  <span id="connBadge" style="font-size:11px;font-weight:600;cursor:default">○ Game not running</span>
  <span id="footerHint" class="hint">STS2 DevMode • SpireScratch Visual Scripting</span>
</footer>

<script src="i18n.js"></script>
<script src="blocks.js"></script>
<script src="generators.js"></script>
<script src="app.js"></script>

</body>
</html>
